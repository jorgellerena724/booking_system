name: Generar Paquete Portable de Windows

on:
  push:
    branches: [ main, master ]

jobs:
  build-portable:
    runs-on: windows-latest
    steps:
      - name: Obtener el código fuente
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Configurar entorno Django
        run: |
          echo "Configurando entorno Django..."
          $env:PYTHONPATH = "$env:PYTHONPATH;$pwd"
          $env:DJANGO_SETTINGS_MODULE = "booking_system.settings"
          python -c "import django; print(f'Django {django.__version__} configurado correctamente')"
        shell: pwsh

      - name: Construir ejecutable (Ejecutar tu .bat)
        run: cmd /c build_final.bat

      - name: Verificar estructura generada
        run: |
          echo "Listando contenido de la carpeta de salida:"
          # Comando corregido para PowerShell
          if (Test-Path "dist\SistemaReservas") {
            Get-ChildItem -Path "dist\SistemaReservas" -File | ForEach-Object { $_.Name }
            echo ""
            echo "Listando directorios dentro de la carpeta:"
            Get-ChildItem -Path "dist\SistemaReservas" -Directory | ForEach-Object { $_.Name }
          } else {
            echo "¡La carpeta 'dist\SistemaReservas' no existe! El build falló."
          }
        shell: pwsh

      - name: Empaquetar para distribución
        run: |
          if (Test-Path "dist\SistemaReservas") {
            Compress-Archive -Path "dist\SistemaReservas" -DestinationPath "SistemaReservas_Portable.zip" -Force
            echo "ZIP creado exitosamente."
          } else {
            echo "ERROR: No se puede crear el ZIP porque 'dist\SistemaReservas' no existe."
            exit 1
          }
        shell: pwsh

      - name: Subir paquete como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SistemaReservas-Portable-Windows
          path: SistemaReservas_Portable.zip
          retention-days: 7