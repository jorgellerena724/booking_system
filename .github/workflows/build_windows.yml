name: Generar Release con Instalador

on:
  push:
    tags:
      - 'v*'  # ¡IMPORTANTE! Se activa SOLO con tags como v1.0, v2.1, etc.

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Obtener código (incluyendo tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para leer tags

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Configurar entorno Django
        run: |
          $env:PYTHONPATH = "$env:PYTHONPATH;$pwd"
          $env:DJANGO_SETTINGS_MODULE = "booking_system.settings"
        shell: pwsh

      - name: Ejecutar build
        run: cmd /c build_final.bat

      - name: Empaquetar para release
        run: |
          # Extrae el número de versión del tag (ej: v1.2.3 -> 1.2.3)
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Compress-Archive -Path "dist\SistemaReservas" -DestinationPath "SistemaReservas_v$version.zip"

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SistemaReservas_v$version.zip
          generate_release_notes: true  # Crea notas automáticas con los commits
          draft: false  # Publicar inmediatamente
          prerelease: false