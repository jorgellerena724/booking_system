name: Generar Release con Instalador

on:
  push:
    tags:
      - 'v*'

# PERMISOS CRÍTICOS: Esto soluciona el error 403
permissions:
  contents: write  # Permite crear releases y subir assets

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Obtener código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Configurar entorno Django
        run: |
          $env:PYTHONPATH = "$env:PYTHONPATH;$pwd"
          $env:DJANGO_SETTINGS_MODULE = "booking_system.settings"
        shell: pwsh

      - name: Ejecutar build
        run: cmd /c build_final.bat

      - name: Empaquetar para release
        id: package  # Este ID permite usar la variable después
        run: |
          # CORRECCIÓN CLAVE: Definir $version correctamente
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $zipName = "SistemaReservas_v$version.zip"
          Compress-Archive -Path "dist\SistemaReservas" -DestinationPath $zipName
          
          # Guardar el nombre para usarlo en el siguiente paso
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          echo "Empaquetado como: $zipName"
        shell: pwsh

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v1
        with:
          # CORRECCIÓN: Usar la variable del paso anterior
          files: ${{ steps.package.outputs.zip_name }}
          generate_release_notes: true
          draft: false
          prerelease: false