{% extends 'reservations/base.html' %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header bg-warning">
            <h4 class="mb-0">🔄 Recalcular Márgenes de Ganancia</h4>
        </div>
        <div class="card-body">
            <p>¿Estás seguro de que quieres recalcular todos los márgenes de ganancia?</p>
            <p><strong>Esto afectará a todas las reservas en el sistema.</strong></p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-warning">
                    Sí, Recalcular Todos los Márgenes
                </button>
                <a href="{% url 'reservations:financial_debug' %}" class="btn btn-secondary">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
